# ─────────────────────────────────────────────────────────────────────────────
# kube-prometheus-stack Helm values
# Tuned for Minikube (reduced resource requests) but mirrors production config.
# ─────────────────────────────────────────────────────────────────────────────

# ── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "Grafana@2024!"
  persistence:
    enabled: true
    size: 1Gi
  service:
    type: ClusterIP
  ingress:
    enabled: false    # managed separately in ingress/ingress-resources.yaml
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Auto-load dashboards from ConfigMaps labelled grafana_dashboard=1
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: browser

# ── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    retentionSize: "5GB"
    # Watch ServiceMonitors across ALL namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    # Watch PodMonitors across ALL namespaces
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    # Watch PrometheusRules across ALL namespaces
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

# ── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 10m
      repeat_interval: 1h
      receiver: 'null'
      routes:
        - matchers:
            - alertname =~ "Watchdog|InfoInhibitor"
          receiver: 'null'
        - matchers:
            - severity = "critical"
          receiver: 'slack-critical'
        - matchers:
            - severity = "warning"
          receiver: 'slack-warnings'
    receivers:
      - name: 'null'
      - name: 'slack-critical'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#alerts-critical'
            send_resolved: true
            title: '[CRITICAL] {{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Namespace:* {{ .Labels.namespace }}
              {{ end }}
      - name: 'slack-warnings'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#alerts-warnings'
            send_resolved: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ── kube-state-metrics ───────────────────────────────────────────────────────
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── node-exporter ────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── Default rules ────────────────────────────────────────────────────────────
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false        # not needed for Minikube
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false
    kubelet: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
