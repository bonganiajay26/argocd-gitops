apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

bases:
  - ../../base

namePrefix: ""

commonLabels:
  environment: dev

images:
  - name: gcr.io/google-samples/hello-app
    newTag: "1.0"   # pin to specific tag; CI updates this

patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: sample-app

configMapGenerator:
  - name: sample-app-config
    literals:
      - ENV=dev
      - LOG_LEVEL=debug
      - REPLICAS=1
