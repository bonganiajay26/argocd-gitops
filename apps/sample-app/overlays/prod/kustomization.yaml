apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

bases:
  - ../../base

commonLabels:
  environment: prod

images:
  - name: gcr.io/google-samples/hello-app
    newTag: "1.0"   # never updated automatically — requires manual promotion PR

patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: sample-app

resources:
  - hpa.yaml

configMapGenerator:
  - name: sample-app-config
    literals:
      - ENV=prod
      - LOG_LEVEL=warn
