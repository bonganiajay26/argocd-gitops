apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

bases:
  - ../../base

commonLabels:
  environment: staging

images:
  - name: gcr.io/google-samples/hello-app
    newTag: "1.0"   # updated by promotion workflow

patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: sample-app

configMapGenerator:
  - name: sample-app-config
    literals:
      - ENV=staging
      - LOG_LEVEL=info
