# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline: Build → Test → Push image → Update dev kustomization tag
# Triggers on: push to main, PR to main
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sample-app

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-test:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Update Dev Kustomization ────────────────────────────────────────────────
  # Runs only on push to main (not PRs). Updates the image tag in the dev
  # overlay, commits, and pushes. ArgoCD picks up the change and deploys.
  update-dev:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}    # PAT with repo write access
          ref: main

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update dev image tag
        env:
          IMAGE_TAG: ${{ needs.build-test.outputs.image-tag }}
        run: |
          cd apps/sample-app/overlays/dev
          kustomize edit set image \
            gcr.io/google-samples/hello-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

      - name: Commit and push
        env:
          IMAGE_TAG: ${{ needs.build-test.outputs.image-tag }}
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@yourorg.com"
          git add apps/sample-app/overlays/dev/kustomization.yaml
          git commit -m "chore(dev): update sample-app to ${IMAGE_TAG} [skip ci]" || exit 0
          git push
